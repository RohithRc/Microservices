server:
  port: 8072

spring:
  application:
    name: gatewayserver
  cloud:
    gateway:
      routes:
        - id: accounts
          uri: lb://accounts
          predicates:
            - Path=/accounts/**
          filters:
            - StripPrefix=1
        - id: cards
          uri: lb://cards
          predicates:
            - Path=/cards/**
          filters:
            - StripPrefix=1
        - id: loans
          uri: lb://loans
          predicates:
            - Path=/loans/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# OpenAPI docs for each downstream service (via gateway path prefix)
springdoc:
  swagger-ui:
    urls:
      - name: accounts
        url: /accounts/v3/api-docs
      - name: cards
        url: /cards/v3/api-docs
      - name: loans
        url: /loans/v3/api-docs
