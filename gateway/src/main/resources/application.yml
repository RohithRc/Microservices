server:
  port: 8072

spring:
  application:
    name: gatewayserver
  cloud:
    gateway:
      routes:
        - id: accounts
          uri: lb://accounts
          predicates:
            - Path=/accounts/**
          filters:
            - StripPrefix=1
        - id: cards
          uri: lb://cards
          predicates:
            - Path=/cards/**
          filters:
            - StripPrefix=1
        - id: loans
          uri: lb://loans
          predicates:
            - Path=/loans/**
          filters:
            - StripPrefix=1
        # Browser hit on http://gateway:8072/ alone → otherwise SCG returns 404 (no route).
        # Swagger UI lives on each service; through the gateway use /accounts/… , /cards/… , /loans/…
        - id: root-redirect
          uri: http://localhost
          predicates:
            - Path=/
          filters:
            - RedirectTo=302, /accounts/swagger-ui/index.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# OpenAPI docs for each downstream service (via gateway path prefix)
springdoc:
  swagger-ui:
    urls:
      - name: accounts
        url: /accounts/v3/api-docs
      - name: cards
        url: /cards/v3/api-docs
      - name: loans
        url: /loans/v3/api-docs
